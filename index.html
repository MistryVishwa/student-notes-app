<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
        <h1>Student Notes App</h1>
    </header>

    <main class="main-content">
      <div class="input-area">
        <input id="noteTitle" placeholder="Title (optional)" />
        <textarea id="noteInput" placeholder="Write your note here... (Markdown supported)"></textarea>
        <div class="input-row">
          <input id="noteTags" placeholder="Tags (comma separated)" />
          <input id="noteSubject" placeholder="Subject / Category (optional)" />
        </div>
        <div class="input-row actions">
          <label><input type="checkbox" id="livePreviewToggle" /> Live preview</label>
          <div style="display:flex; align-items:center; gap:10px">
            <button onclick="addNote()">Add Note</button>
            <span id="saveStatus" class="save-status" aria-live="polite"></span>
          </div>
        </div>

        <div id="livePreview" class="live-preview" aria-hidden="true"></div>
      </div>

      <section class="search-area">
        <input id="searchInput" placeholder="Search notes by title or content..." />
        <div class="filters">
          <input id="filterTags" placeholder="Filter by tag (comma separated)" />
          <select id="filterSubject">
            <option value="">All subjects</option>
          </select>
        </div>
          <div class="suggested-tags-area">
            <input id="newTagInput" placeholder="Add tag" />
            <button id="addTagBtn" type="button">Add Tag</button>
            <div id="suggestedTags" class="suggested-tags"></div>
          </div>
      </section>
    </main>

        <div class="view-controls">
            <button id="toggleViewBtn" onclick="toggleView()" class="secondary-btn">Switch to Board View</button>
        </div>

        <div id="notesContainer"></div>

        <div id="kanbanBoard" class="hidden">
            <div class="kanban-column" id="todo" data-status="todo" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>To Do</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="doing" data-status="doing" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Doing</h2>
                <div class="kanban-content"></div>
            </div>
            <div class="kanban-column" id="done" data-status="done" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <h2>Done</h2>
                <div class="kanban-content"></div>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

<script src="script.js"></script>
</body>
</html>
